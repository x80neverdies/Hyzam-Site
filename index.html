<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hyzam</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --red: rgba(255, 0, 0, 0.56);
            --red-bright: rgba(255, 40, 40, 0.85);
            --red-glow: rgba(255, 0, 0, 0.25);
            --red-deep: rgba(180, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            color: var(--red);
            text-align: center;
            font-family: 'Crimson Text', 'Times New Roman', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,0,0,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,0,0,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridScroll 20s linear infinite;
            z-index: 0;
        }

        /* Radial vignette */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 30%, #000 100%);
            z-index: 1;
            pointer-events: none;
        }

        @keyframes gridScroll {
            0%   { transform: translateY(0); }
            100% { transform: translateY(60px); }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--red);
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0;
        }
        @keyframes float {
            0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
            10%  { opacity: 0.6; }
            90%  { opacity: 0.3; }
            100% { transform: translateY(-10vh) translateX(30px); opacity: 0; }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            padding: 48px 32px;
            animation: fadeUp 1s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(32px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Decorative line above title */
        .ornament {
            display: flex;
            align-items: center;
            gap: 16px;
            animation: fadeUp 1s 0.1s ease both;
            opacity: 0;
        }
        .ornament-line {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--red));
        }
        .ornament-line.right {
            background: linear-gradient(90deg, var(--red), transparent);
        }
        .ornament-diamond {
            width: 6px;
            height: 6px;
            background: var(--red-bright);
            transform: rotate(45deg);
            box-shadow: 0 0 8px var(--red-glow);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 8px var(--red-glow); opacity: 1; }
            50%       { box-shadow: 0 0 20px var(--red-bright); opacity: 0.7; }
        }

        /* Title */
        h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.4rem, 8vw, 4.5rem);
            font-weight: 900;
            color: var(--red);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            text-shadow:
                0 0 20px var(--red-glow),
                0 0 60px var(--red-deep),
                0 0 100px rgba(255,0,0,0.1);
            animation: fadeUp 1s 0.2s ease both, flicker 6s ease-in-out 2s infinite;
            opacity: 0;
            line-height: 1.1;
        }

        @keyframes flicker {
            0%, 90%, 100% { opacity: 1; text-shadow: 0 0 20px var(--red-glow), 0 0 60px var(--red-deep); }
            92%            { opacity: 0.85; text-shadow: none; }
            94%            { opacity: 1; text-shadow: 0 0 20px var(--red-glow), 0 0 60px var(--red-deep); }
            96%            { opacity: 0.9; }
            98%            { opacity: 1; }
        }

        /* Subtitle */
        p {
            font-family: 'Crimson Text', serif;
            font-size: clamp(1rem, 3vw, 1.25rem);
            font-style: italic;
            color: rgba(255, 80, 80, 0.7);
            letter-spacing: 0.06em;
            animation: fadeUp 1s 0.35s ease both;
            opacity: 0;
        }

        /* Image frame */
        .img-frame {
            position: relative;
            display: inline-block;
            animation: fadeUp 1s 0.5s ease both;
            opacity: 0;
        }

        .img-frame::before,
        .img-frame::after {
            content: '';
            position: absolute;
            border: 1px solid var(--red-deep);
            border-radius: 50%;
            animation: ringPulse 3s ease-in-out infinite;
        }
        .img-frame::before {
            inset: -12px;
            animation-delay: 0s;
        }
        .img-frame::after {
            inset: -24px;
            border-color: rgba(255,0,0,0.1);
            animation-delay: 1.5s;
        }

        @keyframes ringPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50%       { opacity: 0.2; transform: scale(1.03); }
        }

        img {
            max-width: 200px;
            width: 100%;
            border-radius: 50%;
            border: 2px solid var(--red-deep);
            box-shadow:
                0 0 30px var(--red-glow),
                0 0 80px rgba(255,0,0,0.1),
                inset 0 0 20px rgba(0,0,0,0.5);
            display: block;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            position: relative;
            z-index: 1;
        }

        img:hover {
            transform: scale(1.05);
            box-shadow:
                0 0 50px rgba(255,0,0,0.5),
                0 0 100px rgba(255,0,0,0.2);
        }

        /* Button link */
        a {
            text-decoration: none;
            animation: fadeUp 1s 0.65s ease both;
            opacity: 0;
        }

        button {
            background-color: transparent;
            color: var(--red-bright);
            border: 1px solid var(--red-deep);
            padding: 14px 40px;
            border-radius: 2px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            transition: color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--red-deep);
            transform: translateX(-100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 0;
        }

        button span {
            position: relative;
            z-index: 1;
        }

        button:hover::before {
            transform: translateX(0);
        }

        button:hover {
            color: #fff;
            border-color: var(--red);
            box-shadow: 0 0 30px var(--red-glow), 0 0 60px rgba(255,0,0,0.1);
        }

        button:active {
            transform: scale(0.97);
        }

        /* Bottom ornament */
        .bottom-ornament {
            display: flex;
            gap: 6px;
            animation: fadeUp 1s 0.8s ease both;
            opacity: 0;
        }
        .dot {
            width: 3px;
            height: 3px;
            background: var(--red-deep);
            border-radius: 50%;
        }
        .dot:nth-child(2) { background: var(--red); }
    </style>
</head>
